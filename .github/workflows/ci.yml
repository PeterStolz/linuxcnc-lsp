name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: pre-commit (format, actionlint, gitleaks, eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  unit:
    name: Typecheck, unit + golden corpus, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test:coverage
      - run: pnpm run build

      # CI is a gate, not a committer: regenerate the coverage badge and fail if
      # the committed copy is out of date, so the author refreshes it in their PR
      # (`pnpm run coverage:badge`). No bot commits to the repo.
      - name: Check coverage badge is up to date
        run: |
          pnpm run coverage:badge
          if ! git diff --quiet .github/badges/coverage.json; then
            echo "::error::Coverage badge is stale. Run 'pnpm run coverage:badge' and commit .github/badges/coverage.json."
            git --no-pager diff .github/badges/coverage.json
            exit 1
          fi

  e2e:
    name: VSCode integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run @vscode/test-electron under xvfb
        run: xvfb-run -a pnpm --filter linuxcnc-lsp run --if-present test:e2e
        # test:e2e is added in the P6 milestone; --if-present + continue-on-error
        # keep this a no-op until then.
        continue-on-error: true

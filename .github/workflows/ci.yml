name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run when new commits land on the same ref (don't pile up).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: pre-commit (format, actionlint, gitleaks, eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  unit:
    name: Typecheck, unit + golden corpus, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run knip

      # continue-on-error lets the coverage upload below run even on a red test
      # run (vitest's reportOnFailure keeps writing coverage/lcov.info); the gate
      # is restored by the "Fail if tests failed" step at the end.
      - name: Test with coverage
        id: tests
        continue-on-error: true
        run: pnpm run test:coverage

      - run: pnpm run build

      # Upload coverage to Codecov, which serves the README badge and PR comments.
      # No file is committed to the repo. Requires the CODECOV_TOKEN repo secret
      # (this repo rejects tokenless uploads). if: always() so a failing run still
      # publishes its coverage rather than dropping the data point.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Restore the red the continue-on-error above deferred, so tests still gate.
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  e2e:
    name: VSCode integration tests
    runs-on: ubuntu-latest
    # A hung extension host shouldn't burn the 6h default; the suite runs in well
    # under a minute once VS Code is downloaded.
    timeout-minutes: 20
    env:
      # Pin the VS Code build so a new stable release can't turn the gate red with
      # no code change; this is the engines floor, so e2e also proves we use no
      # newer API. runTest.ts reads the same var.
      LCNC_VSCODE_VERSION: '1.100.0'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the downloaded VS Code build so each run doesn't re-fetch ~150MB.
      - name: Cache VS Code for @vscode/test-electron
        uses: actions/cache@v4
        with:
          path: packages/client/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ env.LCNC_VSCODE_VERSION }}
      - run: pnpm run build
      - name: Run @vscode/test-electron under xvfb
        # Launches a real VS Code, loads the extension, and drives Format Document,
        # multi-machine go-to-def/find-references, and o-word rename through the
        # live client↔server round trip (packages/client/test/suite/*.test.ts).
        run: xvfb-run -a pnpm --filter linuxcnc-lsp run test:e2e

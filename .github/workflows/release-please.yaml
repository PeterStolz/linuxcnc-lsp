name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      # Component "." is un-prefixed, so outputs are release_created / tag_name.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build VSIX, attach to release, publish to Marketplace + Open VSX
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # release-please owns the version (root package.json + tag); the extension's
      # package.json is bumped here at build time so the VSIX carries the right
      # version without release-please reformatting/conflicting on that file.
      - name: Sync extension version from release tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          node -e 'const fs=require("fs"),f="packages/client/package.json",v=process.env.TAG.replace(/^v/,"");fs.writeFileSync(f,fs.readFileSync(f,"utf8").replace(/"version":\s*"[^"]+"/,"\"version\": \""+v+"\""));'
          echo "extension version -> $TAG"

      - name: Build + package VSIX
        run: pnpm run package

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" linuxcnc-lsp.vsix --clobber

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath linuxcnc-lsp.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm dlx ovsx publish linuxcnc-lsp.vsix -p "$OVSX_PAT"

# Coverage is a guide here, not a merge gate. By design only the runtime analysis
# engine is instrumented (see vitest.config.ts); the LSP wiring (server/index.ts,
# client) and the scripts/fuzz harness are exercised by the @vscode/test-electron
# e2e suite and the fuzz harness instead. So we keep the Codecov badge + PR report
# but do not fail a PR on coverage deltas (large feature PRs legitimately add
# e2e-tested code that unit coverage does not reach).
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
comment:
  layout: "reach, diff, files"
  require_changes: false

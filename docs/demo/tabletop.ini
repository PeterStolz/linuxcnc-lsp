; Demo machine config used to capture the README screenshots.
; A small, realistic 3-axis router. Curated so the screenshots reproduce.
[EMC]
MACHINE = tabletop-router
VERSION = 1.0

[DISPLAY]
DISPLAY = axis
PROGRAM_PREFIX = nc_files
CYCLE_TIME = 0.100

[KINS]
JOINTS = 3
KINEMATICS = trivkins

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
SUBROUTINES = nc_files/subs

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
MAX_LINEAR_VELOCITY = 50.0

[HAL]
HALFILE = tabletop.hal

[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50.0
MAX_ACCELERATION = 500.0
; PGAIN is referenced by tabletop.hal — go-to-definition / find-references land here.
PGAIN = 50.0
; NOTE: IGAIN is intentionally NOT defined here, so the HAL reference to
;       [JOINT_0]IGAIN is flagged (screenshot: hero squiggle + quick-fix to add it).

[HAL]
HALUI = halui
HALFILE = Flexicam.hal
HALFILE = custom.hal
POSTGUI_HALFILE = custom_postgui.hal
SHUTDOWN = shutdown.hal

[HALUI]
# Index 0: halui.mdi-command-00 fires the Z touch-off subroutine.
# Driven by pyvcp.touchoff-z-btn in custom_postgui.hal.
MDI_COMMAND = o<touchoff_z> call

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XXYZ kinstype=BOTH

[TRAJ]
COORDINATES =  XXYZ
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 2.50
# Was 25.00 (stepper-era), then 200 (servo cardinal-edge cap). Now 283 =
# sqrt(2) * 200 so the Xbox jog's square-gate stick mapping (lincurve in
# custom.hal) actually delivers full per-axis speed at 45 deg edge: each
# axis runs at 200 mm/s and the combined vector reaches ~283 mm/s. Without
# this raise the planner would clip diagonal motion back to 200 combined,
# making per-axis 141 mm/s -- the boost would be invisible.
# AXIS_X/Y MAX_VELOCITY=250 each, so per-axis still has 50 mm/s (17%)
# headroom. Side effect: G0 rapids and G-code F-words can now request up
# to 283 mm/s combined; existing G-code at F<=12000 (200 mm/s) is unaffected.
MAX_LINEAR_VELOCITY = 283.00

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

